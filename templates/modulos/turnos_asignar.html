{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:900px;">
  <h2>Asignar turno</h2>

  <form method="post">
    <div class="form-row">
      <div style="flex:2">
        <label>Empleado</label>
        <select name="employee_id" required>
          <option value="">-- seleccionar --</option>
          {% for e in empleados %}
            <option value="{{ e.employee_id }}">{{ e.doc_number }} - {{ e.first_name }} {{ e.last_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div style="flex:1">
        <label>Turno</label>
        <select name="shift_id" required>
          <option value="">-- seleccionar --</option>
          {% for s in shifts %}
            <option value="{{ s.shift_id }}">{{ s.shift_code }} ({{ s.start_time.strftime('%H:%M') }}-{{ s.end_time.strftime('%H:%M') }})</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row" style="margin-top:10px;">
      <div style="flex:1">
        <label>Válido desde</label>
        <input type="date" name="valid_from" required>
      </div>
      <div style="flex:1">
        <label>Válido hasta (opcional)</label>
        <input type="date" name="valid_to">
      </div>
    </div>

    <div style="margin-top:14px;">
      <button type="submit">Guardar</button>
      <a href="{{ url_for('modulos.turnos') }}"><button type="button" class="secondary">Volver</button></a>
    </div>
  </form>
</div>
{% endblock %}
