{% extends "base.html" %}
{% block content %}
<div class="page">
  <div class="page-header">
    <h2>Asignar turno base</h2>
    <p class="muted">Selecciona el colaborador (incluye administrativos) y el turno base.</p>
  </div>

  <form method="post" class="card" style="padding:14px; max-width:860px;">
    <div class="form-row" style="display:flex; gap:12px; flex-wrap:wrap;">
      <div style="min-width:340px; flex:1;">
        <label>Colaborador</label>
        <select class="select" name="employee_id" required>
          <option value="">— Seleccionar —</option>
          {% for e in employees %}
            <option value="{{ e.employee_id }}" {{ (employee_id and e.employee_id==employee_id) and 'selected' or '' }}>
              {{ e.display_name }} · {{ e.shift_group }} · {{ e.doc_number or 'Sin cédula' }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div style="min-width:280px; flex:1;">
        <label>Turno base</label>
        <select class="select" name="shift_id" required>
          <option value="">— Seleccionar —</option>
          {% for s in shifts %}
            <option value="{{ s.shift_id }}">
              {{ s.shift_code }} · {{ s.label }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-row" style="display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;">
      <div style="min-width:200px;">
        <label>Vigente desde</label>
        <input class="input" type="date" name="valid_from" value="{{ valid_from or '' }}" />
      </div>
      <div style="min-width:200px;">
        <label>Vigente hasta</label>
        <input class="input" type="date" name="valid_to" value="{{ valid_to or '' }}" />
      </div>
    </div>

    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px;">
      <a class="btn btn-secondary" href="{{ url_for('modulos.turnos') }}">Volver</a>
      <button class="btn btn-primary" type="submit">Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
