<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RRHH - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body class="rrhh-login-body">
  <div class="container py-5" style="max-width:460px;">
    <div class="card rrhh-login-card shadow-lg border-0">
      <div class="card-body p-4 p-md-5">

        <div class="text-center mb-4">
          <img
            src="{{ url_for('static', filename='img/logo.png') }}"
            alt="Logo"
            class="rrhh-login-logo mb-3"
            onerror="this.style.display='none';"
          >
          <h4 class="mb-1 rrhh-login-title">Ingreso RRHH</h4>
          <div class="text-muted small">Qualitas Colombia</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ 'danger' if cat=='error' else cat }} mb-3">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input class="form-control rrhh-control" name="usuario" autocomplete="username" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input class="form-control rrhh-control" type="password" name="contrasena" autocomplete="current-password" required>
          </div>

          <button class="btn btn-primary w-100 rrhh-btn-primary">Entrar</button>
        </form>

        <div class="mt-3 text-center">
          <a class="small rrhh-link" href="{{ url_for('auth.test_ldap') }}">Probar LDAP</a>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
